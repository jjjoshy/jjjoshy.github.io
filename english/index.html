<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Whisperer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1008;
    --paper: #f5efe6;
    --accent: #c0392b;
    --gold: #b8860b;
    --muted: #8b7355;
    --balloon-bg: #1a1008;
    --balloon-text: #f5efe6;

    /* Level colours */
    --beginner: #2e7d32;
    --beginner-light: #e8f5e9;
    --intermediate: #1565c0;
    --intermediate-light: #e3f0ff;
    --advanced: #6a1b9a;
    --advanced-light: #f3e5f5;
    --active-color: var(--intermediate);
    --active-light: var(--intermediate-light);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--paper);
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 31px,
        rgba(139,115,85,0.13) 31px,
        rgba(139,115,85,0.13) 32px
      );
    font-family: 'Playfair Display', Georgia, serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  header h1 {
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
  }

  header h1 span {
    color: var(--accent);
    font-style: italic;
  }

  header p {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 14px;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: var(--gold);
    margin: 18px auto 0;
  }

  /* Topics panel */
  .topics-panel {
    position: absolute;
    left: 20px;
    top: 140px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 200;
  }

  .topic-btn {
    background: rgba(255,255,255,0.85);
    border: 1px solid rgba(26,16,8,0.06);
    padding: 8px 12px;
    border-radius: 999px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .topic-btn.active {
    background: var(--paper);
    color: var(--ink);
    border-color: rgba(26,16,8,0.12);
    box-shadow: 0 6px 20px rgba(26,16,8,0.06);
  }

  @media (max-width: 760px) {
    .topics-panel {
      position: relative;
      left: 0;
      top: 0;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 18px;
    }
  }

  /* ── Level selector ── */
  .level-selector {
    display: flex;
    gap: 12px;
    margin-bottom: 44px;
    background: rgba(255,255,255,0.6);
    padding: 6px;
    border-radius: 999px;
    box-shadow: 0 2px 16px rgba(26,16,8,0.10), inset 0 1px 3px rgba(255,255,255,0.8);
    backdrop-filter: blur(8px);
  }

  .level-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 10px 26px;
    border-radius: 999px;
    border: 2px solid transparent;
    background: transparent;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(.4,0,.2,1);
    color: var(--muted);
    position: relative;
    overflow: hidden;
  }

  .level-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 999px;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .level-btn:hover {
    color: var(--ink);
  }

  .level-btn.beginner.active,
  .level-btn.beginner:hover {
    color: var(--beginner);
    border-color: var(--beginner);
  }
  .level-btn.beginner.active {
    background: var(--beginner-light);
    box-shadow: 0 2px 12px rgba(46,125,50,0.18);
  }

  .level-btn.intermediate.active,
  .level-btn.intermediate:hover {
    color: var(--intermediate);
    border-color: var(--intermediate);
  }
  .level-btn.intermediate.active {
    background: var(--intermediate-light);
    box-shadow: 0 2px 12px rgba(21,101,192,0.18);
  }

  .level-btn.advanced.active,
  .level-btn.advanced:hover {
    color: var(--advanced);
    border-color: var(--advanced);
  }
  .level-btn.advanced.active {
    background: var(--advanced-light);
    box-shadow: 0 2px 12px rgba(106,27,154,0.18);
  }

  .level-btn .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    background: currentColor;
    opacity: 0.7;
  }

  /* ── Level badge under grid ── */
  .level-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 5px 18px;
    border-radius: 999px;
    margin-bottom: 28px;
    border: 1.5px solid;
    transition: all 0.3s;
  }
  .level-badge.beginner  { color: var(--beginner);     border-color: var(--beginner);     background: var(--beginner-light); }
  .level-badge.intermediate { color: var(--intermediate); border-color: var(--intermediate); background: var(--intermediate-light); }
  .level-badge.advanced  { color: var(--advanced);     border-color: var(--advanced);     background: var(--advanced-light); }

  /* ── Word grid ── */
  .words-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 16px 20px;
    justify-content: center;
    max-width: 820px;
    width: 100%;
  }

  .word-card {
    position: relative;
    cursor: pointer;
    padding: 16px 28px;
    border-radius: 999px;
    border: 1.8px solid rgba(139,115,85,0.28);
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(6px);
    transition: border-color 0.22s, transform 0.15s, box-shadow 0.22s, background 0.22s;
    user-select: none;
    box-shadow: 0 2px 8px rgba(26,16,8,0.07);
  }

  .word-card:hover {
    border-color: var(--active-color);
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(26,16,8,0.13);
    background: rgba(255,255,255,0.85);
  }

  .word-card:active { transform: translateY(0); }

  /* active-color per level is set via JS class on body */
  body.beginner     { --active-color: var(--beginner); }
  body.intermediate { --active-color: var(--intermediate); }
  body.advanced     { --active-color: var(--advanced); }

  .word-text {
    font-size: clamp(1.3rem, 3vw, 1.9rem);
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ink);
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .word-card:hover .word-text { color: var(--active-color); }

  .word-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    position: absolute;
    top: 6px;
    right: 14px;
  }

  .sound-icon {
    width: 15px;
    height: 15px;
    opacity: 0;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }
  .word-card:hover .sound-icon { opacity: 1; }

  /* ── Balloon ── */
  .balloon {
    position: absolute;
    bottom: calc(100% + 26px);
    left: 50%;
    transform: translateX(-50%) translateY(18px);
    background: var(--balloon-bg);
    color: var(--balloon-text);
    padding: 14px 18px;
    min-width: 230px;
    max-width: 310px;
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 12px 40px rgba(26,16,8,0.30);
    opacity: 0;
    border-radius: 18px;
    transition: opacity 0.24s, transform 0.24s;
  }

  .balloon.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(-8px);
    }

  .balloon::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 9px solid transparent;
    border-top-color: var(--balloon-bg);
  }

  /* thin progress bar at bottom of balloon */
  .balloon-timer {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    border-radius: 0 0 18px 18px;
    background: var(--gold);
    width: 100%;
    transform-origin: left;
    transform: scaleX(1);
    transition: none;
  }
  .balloon.visible .balloon-timer {
    animation: shrink 4s linear forwards;
  }
  @keyframes shrink {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }

  .balloon-ipa {
    font-family: 'DM Mono', monospace;
    font-size: 0.84rem;
    color: var(--gold);
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .balloon-meaning {
    font-size: 0.86rem;
    font-style: italic;
    line-height: 1.55;
    color: #e8dcc8;
  }

  .balloon-pos {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .balloon-loading {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: #9a8a74;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .spinner {
    width: 12px; height: 12px;
    border: 2px solid #9a8a74;
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Ripple ── */
  @keyframes ripple {
    0%   { box-shadow: 0 0 0 0 rgba(var(--ripple-rgb),0.38); }
    100% { box-shadow: 0 0 0 18px rgba(var(--ripple-rgb),0); }
  }
  body.beginner     { --ripple-rgb: 46,125,50; }
  body.intermediate { --ripple-rgb: 21,101,192; }
  body.advanced     { --ripple-rgb: 106,27,154; }

  .word-card.playing { animation: ripple 0.6s ease-out; }

  /* ── Bottom controls ── */
  .controls {
    display: flex;
    gap: 14px;
    margin-top: 40px;
    align-items: center;
  }

  .reload-btn {
    background: rgba(255,255,255,0.7);
    border: 1.8px solid rgba(139,115,85,0.4);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 11px 28px;
    border-radius: 999px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(26,16,8,0.07);
  }

  .reload-btn:hover {
    border-color: var(--active-color);
    color: var(--active-color);
    box-shadow: 0 4px 16px rgba(26,16,8,0.12);
  }

  footer {
    margin-top: 44px;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  /* Entrance animation */
  .word-card {
    opacity: 0;
    animation: fadeUp 0.45s forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body class="intermediate">

<!-- Topics panel (left side) -->
<div class="topics-panel" id="topicsPanel">

<header>
  <h1>Word <span>Whisperer</span></h1>
  <div class="divider"></div>
  <p>Click any word to hear it spoken</p>
</header>

<!-- Level selector -->
<div class="level-selector">
  <button class="level-btn beginner" onclick="setLevel('beginner')">
    <span class="dot"></span>Beginner
  </button>
  <button class="level-btn intermediate active" onclick="setLevel('intermediate')">
    <span class="dot"></span>Intermediate
  </button>
  <button class="level-btn advanced" onclick="setLevel('advanced')">
    <span class="dot"></span>Advanced
  </button>
</div>

<div class="level-badge intermediate" id="levelBadge">Intermediate · A2–B1</div>

<div class="words-grid" id="wordsGrid"></div>

<div class="controls">
  <button class="reload-btn" onclick="loadWords()">↻ New Words</button>
</div>

<footer>Powered by Free Dictionary API &nbsp;·&nbsp; dictionaryapi.dev</footer>

const LEVEL_LABELS = {

// Topics data
const TOPICS = ['general','education','teaching','mental_health','shopping','politics','geography','science','technology','mathematics'];

// Words per topic and level. 'general' reuses WORDS object below.
const TOPIC_WORDS = {

let currentTopic = 'general';

function setTopic(topic) {
  currentTopic = topic;
  document.querySelectorAll('.topic-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.topic === topic);
  });
  loadWords();
}

let currentLevel = 'intermediate';
let balloonTimer = null;
let currentCard = null;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function setLevel(level) {
  currentLevel = level;
  document.body.className = level;

  // Update buttons
  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.classList.toggle('active', btn.classList.contains(level));
  });

  // Update badge
  const badge = document.getElementById('levelBadge');
  badge.className = `level-badge ${level}`;
  badge.textContent = LEVEL_LABELS[level];

  loadWords();
}

function loadWords() {
  const grid = document.getElementById('wordsGrid');
  grid.innerHTML = '';
  balloonTimer && clearTimeout(balloonTimer);
  currentCard = null;

  // Use topic-specific words when available
  const topicSource = (TOPIC_WORDS && TOPIC_WORDS[currentTopic] && TOPIC_WORDS[currentTopic][currentLevel]) || WORDS[currentLevel];
  const words = shuffle(topicSource).slice(0, 10);

  words.forEach((word, i) => {
    const card = document.createElement('div');
    card.className = 'word-card';
    card.style.animationDelay = `${i * 55}ms`;
    card.innerHTML = `
      <span class="word-num">${String(i + 1).padStart(2, '0')}</span>
      <span class="word-text">${word}
        <svg class="sound-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </span>
      <div class="balloon" id="balloon-${i}">
        <div class="balloon-loading"><span class="spinner"></span>Loading…</div>
        <div class="balloon-timer"></div>
      </div>
    `;
    card.addEventListener('click', () => handleWordClick(word, i, card));
    grid.appendChild(card);
  });
}

async function handleWordClick(word, idx, card) {
  if (balloonTimer) clearTimeout(balloonTimer);

  if (currentCard && currentCard !== card) {
    const prev = currentCard.querySelector('.balloon');
    if (prev) prev.classList.remove('visible');
  }

  currentCard = card;
  card.classList.remove('playing');
  void card.offsetWidth; // reflow to restart animation
  card.classList.add('playing');
  setTimeout(() => card.classList.remove('playing'), 650);

  const balloon = document.getElementById(`balloon-${idx}`);
  balloon.innerHTML = `<div class="balloon-loading"><span class="spinner"></span>Loading…</div><div class="balloon-timer"></div>`;
  balloon.classList.add('visible');

  try {
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
    const data = await res.json();
    const entry = data[0];

    const phonetic = entry.phonetic ||
      (entry.phonetics && entry.phonetics.find(p => p.text)?.text) || '';
    const firstMeaning = entry.meanings?.[0];
    const pos = firstMeaning?.partOfSpeech || '';
    const definition = firstMeaning?.definitions?.[0]?.definition || 'No definition found.';
    const audioUrl = entry.phonetics?.find(p => p.audio && p.audio.trim())?.audio;

    balloon.innerHTML = `
      ${pos ? `<div class="balloon-pos">${pos}</div>` : ''}
      ${phonetic ? `<div class="balloon-ipa">${phonetic}</div>` : ''}
      <div class="balloon-meaning">${definition}</div>
      <div class="balloon-timer"></div>
    `;

    if (audioUrl) {
      const fullUrl = audioUrl.startsWith('//') ? 'https:' + audioUrl : audioUrl;
      new Audio(fullUrl).play().catch(() => speakFallback(word));
    } else {
      speakFallback(word);
    }

  } catch (e) {
    balloon.innerHTML = `<div class="balloon-ipa">${word}</div><div class="balloon-meaning">Could not load definition.</div><div class="balloon-timer"></div>`;
    speakFallback(word);
  }

  balloonTimer = setTimeout(() => {
    balloon.classList.remove('visible');
  }, 4000);
}

function speakFallback(word) {
  if ('speechSynthesis' in window) {
    const utt = new SpeechSynthesisUtterance(word);
    utt.lang = 'en-US';
    utt.rate = 0.85;
    speechSynthesis.cancel();
    speechSynthesis.speak(utt);
  }
}

loadWords();
</script>
