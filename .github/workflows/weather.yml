name: Update Weather Data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create data directory
        run: mkdir -p data

      - name: Download weather data
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          WEATHER_CITY: ${{ secrets.WEATHER_CITY }}
          WEATHER_LAT: ${{ secrets.WEATHER_LAT }}
          WEATHER_LON: ${{ secrets.WEATHER_LON }}
        run: |
          if [ -z "$OPENWEATHER_API_KEY" ]; then
            echo "Missing OPENWEATHER_API_KEY secret"
            exit 1
          fi

          if [ -n "$WEATHER_LAT" ] && [ -n "$WEATHER_LON" ]; then
            query="lat=${WEATHER_LAT}&lon=${WEATHER_LON}"
          else
            query="q=${WEATHER_CITY:-London}"
          fi

          api_url="https://api.openweathermap.org/data/2.5/weather?${query}&units=metric&appid=${OPENWEATHER_API_KEY}"
          response=$(curl -sSL "$api_url")

          if echo "$response" | jq -e '.cod != 200' >/dev/null 2>&1; then
            echo "Weather API response error:"
            echo "$response"
            exit 1
          fi

          echo "$response" | jq --arg updated "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" '. + {last_updated: $updated}' > data/weather.json

      - name: Commit and push weather data
        run: |
          if git diff --quiet -- data/weather.json; then
            echo "No weather changes to commit."
            exit 0
          fi
          git add data/weather.json
          git commit -m "Update weather data"
          git push
